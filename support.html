<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Support Us - WhatsApp Privacy Extension</title>
    <meta name="description" content="Support the development of the WhatsApp Privacy Extension. Help us keep this tool free, secure, and ad-free for everyone.">
    <meta name="keywords" content="support WhatsApp privacy extension, donate to privacy tool, free Chrome extension support">
    <meta name="author" content="WhatsApp Privacy Extension">
    
    <meta property="og:title" content="Support Us - WhatsApp Privacy Extension">
    <meta property="og:description" content="Support the development of the WhatsApp Privacy Extension. Help us keep this tool free, secure, and ad-free for everyone.">
    <meta property="og:type" content="website">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            color: #333;
            background-color: #f9f9f9;
            text-align: center;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }
        
        /* Navbar Styles - Using CSS Grid for centering */
        nav {
            background-color: #075e54;
            padding: 10px 15px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
        }

        /* 1. Grid Placeholder (Moved to the left to maintain centering) */
        .nav-placeholder {
            grid-column: 1;
            visibility: hidden;
        }

        /* 2. Center Links */
        .centered-links {
            grid-column: 2;
            justify-self: center;
            display: flex;
            gap: 20px;
        }

        .centered-links a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            padding: 8px 12px;
            border-radius: 4px;
            transition: background 0.3s;
        }

        .centered-links a:hover {
            background: rgba(255,255,255,0.1);
        }

        /* 3. Dark Mode Toggle (Shifted to Extreme Right) */
        .theme-btn {
            grid-column: 3;
            justify-self: end;
            background: transparent;
            border: none;
            color: white;
            width: 28px;
            height: 28px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s ease, opacity 0.2s ease;
            padding: 0;
        }

        .theme-btn:hover {
            transform: scale(1.1);
            opacity: 0.8;
        }

        .theme-btn svg {
            width: 100%;
            height: 100%;
        }

        .support-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            max-width: 600px;
            border-top: 5px solid #128c7e;
            transition: background-color 0.3s, box-shadow 0.3s;
        }
        h1 {
            color: #128c7e;
            margin-bottom: 10px;
        }
        .coming-soon-badge {
            display: inline-block;
            background-color: #ff9800;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }
        p.message {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #555;
            transition: color 0.3s;
        }
        footer {
            background-color: #333;
            color: white;
            padding: 20px;
            margin-top: auto; /* Push footer to bottom */
        }

        /* --- DARK MODE STYLES --- */
        body.dark-mode {
            background-color: #121212;
            color: #e0e0e0;
        }
        
        body.dark-mode nav {
            background-color: #1e1e1e;
        }

        body.dark-mode .card {
            background-color: #1e1e1e;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        body.dark-mode p.message {
            color: #ccc;
        }
    </style>
</head>
<body>

    <nav aria-label="Main Navigation">
        <div class="nav-placeholder"></div>
        
        <div class="centered-links">
            <a href="index.html">Home</a>
            <a href="support.html">Support Us</a>
            <a href="#">Review Us</a>
        </div>
        
        <button id="theme-toggle" class="theme-btn" aria-label="Toggle dark mode">
            <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        </button>
    </nav>

    <main class="support-container">
        <section class="card">
            <span class="coming-soon-badge">Coming Soon</span>
            <h1>Support the Project</h1>
            <p class="message">
                To help us keep pushing out new updates and ensure the extension remains completely free of advertisements, please consider supporting us! 
            </p>
            <p style="color: #777; font-size: 0.9rem; margin-top: 30px;">
                <em>Our system is currently being set up. Check back soon!</em>
            </p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 WhatsApp Privacy Extension</p>
    </footer>

    <script>
        const toggleButton = document.getElementById('theme-toggle');
        
        // Simple SVG icons
        const moonSVG = '<svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>';
        const sunSVG = '<svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>';

        // Check for saved user preference
        const currentTheme = localStorage.getItem('theme');
        if (currentTheme === 'dark') {
            document.body.classList.add('dark-mode');
            toggleButton.innerHTML = sunSVG; 
        } else {
            toggleButton.innerHTML = moonSVG;
        }

        // Toggle button click event
        toggleButton.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            let theme = 'light';
            
            if (document.body.classList.contains('dark-mode')) {
                theme = 'dark';
                toggleButton.innerHTML = sunSVG; 
            } else {
                theme = 'light';
                toggleButton.innerHTML = moonSVG; 
            }
            
            // Save preference to localStorage so it applies across pages
            localStorage.setItem('theme', theme);
        });
    </script>
</body>
</html>
